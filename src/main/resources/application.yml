spring:
  application:
    name: event-driven-order-platform
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/orders}
    username: ${DB_USERNAME:orders}
    password: ${DB_PASSWORD:orders}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate.jdbc.time_zone: UTC
  flyway:
    enabled: true
  jackson:
    default-property-inclusion: non_null
server:
  port: ${SERVER_PORT:8080}
app:
  jwt:
    issuer: event-driven-order-platform
    secret: ${JWT_SECRET:change-me-change-me-change-me-change-me-change-me}
    access-token-minutes: 30
    refresh-token-days: 7
logging:
  pattern:
    level: "%5p [correlationId:%X{correlationId:-}]"
springdoc:
  swagger-ui:
    path: /swagger-ui.html
