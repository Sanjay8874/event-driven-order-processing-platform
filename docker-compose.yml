services:
  postgres:
    image: postgres:16-alpine
    container_name: order-platform-postgres
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: orders
      POSTGRES_PASSWORD: orders
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orders -d orders"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: order-platform-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/orders
      DB_USERNAME: orders
      DB_PASSWORD: orders
      JWT_SECRET: local-dev-secret-local-dev-secret-local-dev-secret
    ports:
      - "8080:8080"

volumes:
  postgres-data:
