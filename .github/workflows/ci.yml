name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build and test
        run: mvn -B clean verify
      - name: Sonar analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        run: mvn -B sonar:sonar -Dsonar.token=${{ env.SONAR_TOKEN }}
      - name: Docker build
        run: docker build -t event-driven-order-platform:${{ github.sha }} .
